name: Deploy site to GitHub Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Separate group per ref so PR build checks don't serialize behind (or block)
# the production Pages deploy. Never cancel an in-progress prod deploy.
concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: site
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # Persist optimized images + installed deps so image re-encoding and
      # installs are skipped on unchanged inputs. The cache key rolls when the
      # source images, the optimizer, or the lockfile change.
      - name: Cache image outputs and deps
        uses: actions/cache@v4
        with:
          path: |
            site/.image-cache
            site/static/img
            site/node_modules
          key: >-
            ${{ runner.os }}-site-${{ hashFiles('site/bun.lock') }}-${{
            hashFiles('site/scripts/optimize-images.ts') }}-${{
            hashFiles('data/source/image/**') }}
          restore-keys: |
            ${{ runner.os }}-site-${{ hashFiles('site/bun.lock') }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run check

      - name: Build
        env:
          BASE_PATH: /directory
        run: bun run build

      # Only the production deploy consumes the artifact; skip the upload on PRs
      # (they run this job purely as a build/typecheck check).
      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/build

  deploy:
    # Publish only on pushes to main; PRs run the build job as a check.
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
